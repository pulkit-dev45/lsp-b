<article class="group border border-neutral-200/80 rounded-2xl overflow-hidden hover:shadow-md transition-shadow bg-white">
    <div class="aspect-video bg-neutral-100 overflow-hidden relative">
        {% if course.thumbnail %}
        <img src="{{ course.thumbnail.url }}" alt="{{ course.title }}" class="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-500">
        {% else %}
        <div class="w-full h-full flex items-center justify-center text-neutral-300">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        </div>
        {% endif %}
        {% if course.id in enrolled_ids %}
        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur text-xs font-medium text-black px-2.5 py-1 rounded-full border border-neutral-200/80">
            Enrolled
        </div>
        {% endif %}
    </div>
    <div class="p-5">
        <span class="inline-block text-xs font-medium text-neutral-400 uppercase tracking-wider mb-2">Course</span>
        <h3 class="text-lg font-semibold text-black leading-snug">{{ course.title }}</h3>
        <p class="mt-2 text-sm text-neutral-500 line-clamp-2">{{ course.description }}</p>
        <a href="{% url 'course-detail' course.id %}" class="mt-4 inline-flex items-center text-sm font-medium text-black hover:underline underline-offset-4">
            {% if course.id in enrolled_ids %}Continue &rarr;{% else %}View Course &rarr;{% endif %}
        </a>
    </div>
</article>
