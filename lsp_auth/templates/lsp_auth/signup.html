{% extends 'base.html' %}
{% block title %}Sign Up — NDU Digital{% endblock %}
{% block content %}
<section class="max-w-sm mx-auto px-6 pt-20 pb-24">
    <h1 class="text-3xl font-semibold tracking-tight text-black text-center">Create your account</h1>
    <p class="mt-2 text-sm text-neutral-500 text-center">Start learning in minutes.</p>
    <form method="post" class="mt-8 space-y-5">
        {% csrf_token %}
        <div>
            <label for="username" class="block text-sm font-medium text-neutral-700 mb-1">Username</label>
            <input type="text" name="username" id="username" required
                   class="w-full px-4 py-2.5 rounded-xl border border-neutral-300 focus:outline-none focus:ring-2 focus:ring-black/10 transition text-sm">
        </div>
        <div>
            <label for="email" class="block text-sm font-medium text-neutral-700 mb-1">Email</label>
            <input type="email" name="email" id="email" required
                   class="w-full px-4 py-2.5 rounded-xl border border-neutral-300 focus:outline-none focus:ring-2 focus:ring-black/10 transition text-sm">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-neutral-700 mb-1">Password</label>
            <input type="password" name="password" id="password" required
                   class="w-full px-4 py-2.5 rounded-xl border border-neutral-300 focus:outline-none focus:ring-2 focus:ring-black/10 transition text-sm">
        </div>
        {% if error %}
        <p class="text-sm text-red-500">{{ error }}</p>
        {% endif %}
        <button type="submit" class="w-full py-2.5 rounded-full bg-black text-white text-sm font-medium hover:bg-neutral-800 transition-colors">
            Create Account
        </button>
        <p class="text-center text-sm text-neutral-400">
            Already have an account? <a href="{% url 'login' %}" class="text-black underline underline-offset-2 hover:no-underline">Sign in</a>
        </p>
    </form>
</section>
{% endblock %}
